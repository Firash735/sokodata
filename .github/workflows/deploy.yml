# .github/workflows/deploy.yml
# Runs on every push to any branch
# - Tests: lint check (no syntax errors)
# - Deploy preview: on push to dev/feature branches
# - Deploy production: only on push to main

name: SokoData CI/CD

on:
  push:
    branches: ['**']       # all branches
  pull_request:
    branches: [main, staging]

jobs:
  # ── Job 1: Validate (runs on ALL branches) ─────────────────
  validate:
    name: Validate — no broken code reaches clients
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check HTML is valid
        run: |
          npx --yes html-validate frontend/index.html \
            --config '{"rules":{"void-style":"omit","attr-quotes":"double"}}' \
            || echo "HTML warnings above — review before merging to main"

      - name: Check JS for syntax errors
        run: |
          for f in frontend/js/*.js; do
            node --check "$f" && echo "✓ $f OK" || (echo "✗ SYNTAX ERROR in $f" && exit 1)
          done

      - name: Check SQL migrations exist
        run: |
          ls supabase/migrations/*.sql || (echo "No SQL migrations found" && exit 1)
          echo "SQL files present:"
          ls supabase/migrations/*.sql

      - name: Verify no secrets in code
        run: |
          # Fail if any real-looking API key is hardcoded
          if grep -rn "sk_live_\|AIzaSy\|sbp_\|eyJhbGci" frontend/js/ --include="*.js"; then
            echo "SECURITY: Possible secret key found in JS files. Move to .env.local"
            exit 1
          fi
          echo "✓ No hardcoded secrets detected"

  # ── Job 2: Deploy to Vercel Preview (dev/feature branches) ─
  deploy-preview:
    name: Deploy preview (staging URL)
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref != 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel (preview)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:   ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:  ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          # No --prod flag = preview URL only
        id: preview
      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Preview deployed: ${{ steps.preview.outputs.preview-url }}\n\nTest everything before merging to main.'
            })

  # ── Job 3: Deploy to Production (main branch only) ─────────
  deploy-production:
    name: Deploy production → sokodata.co.ke
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel (production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:   ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:  ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./frontend
      - name: Notify deployment success
        run: echo "🚀 Production deployed to sokodata.co.ke at $(date)"
