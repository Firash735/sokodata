<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SokoData — Market Detail</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,600&family=Plus+Jakarta+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --tiber:#042820;--tiber-mid:#0a3d30;--tiber-light:#0d4d3c;--tiber-border:#0f5a46;
  --husk:#b7a25e;--husk-l:#cdbf85;--husk-d:#9a8445;
  --sanjuan:#35556e;--sanjuan-l:#4a6d8a;
  --cherry:#74070e;--cherry-l:#c0101b;
  --curious:#2092e9;--mulled:#614d70;
  --cream:#f5f0e8;--text2:#a8c4b8;--text3:#5a8070;--text4:#3d5e58;
  --border:rgba(183,162,94,0.1);--border2:rgba(183,162,94,0.18);
  --sans:"Plus Jakarta Sans",sans-serif;--serif:"Fraunces",serif;--mono:"DM Mono",monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--tiber);color:var(--cream);min-height:100vh;cursor:none}

/* CURSOR */
.cursor{position:fixed;width:7px;height:7px;background:var(--husk);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .1s}
.cursor-ring{position:fixed;width:26px;height:26px;border:1px solid rgba(183,162,94,0.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .15s ease}

/* NAV */
.nav{height:56px;padding:0 1.5rem;display:flex;align-items:center;gap:14px;background:rgba(4,40,32,0.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.nav-back{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--text3);text-decoration:none;cursor:none;transition:color .15s;border:none;background:none;padding:6px 12px;border-radius:4px;border:1px solid var(--border)}
.nav-back:hover{color:var(--husk);border-color:var(--border2)}
.nav-logo{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:14px;font-weight:500;color:var(--husk);text-decoration:none;margin-left:auto}
.nav-breadcrumb{font-family:var(--mono);font-size:11px;color:var(--text4)}

/* HERO BAND */
.hero-band{padding:2.5rem 1.5rem 2rem;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.hero-band::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 0% 50%,rgba(183,162,94,0.06) 0%,transparent 70%);pointer-events:none}
.hero-inner{max-width:900px;margin:0 auto;position:relative;z-index:1}
.hero-eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.hero-tag{font-family:var(--mono);font-size:9px;font-weight:500;color:var(--husk);background:rgba(183,162,94,0.1);border:1px solid rgba(183,162,94,0.2);padding:4px 12px;border-radius:12px;letter-spacing:0.1em;text-transform:uppercase}
.hero-updated{font-family:var(--mono);font-size:9px;color:var(--text4);letter-spacing:0.06em}
.hero-title{font-family:var(--serif);font-size:clamp(32px,5vw,56px);font-weight:700;letter-spacing:-0.02em;line-height:1.08;margin-bottom:.75rem}
.hero-location{font-size:15px;color:var(--text2);margin-bottom:1.5rem;font-weight:300}
.verdict-card{display:inline-flex;align-items:center;gap:14px;background:var(--tiber-mid);border:1px solid var(--border2);border-radius:10px;padding:14px 20px}
.verdict-price{font-family:var(--mono);font-size:32px;font-weight:500;color:var(--cream);line-height:1}
.verdict-divider{width:1px;height:40px;background:var(--border2)}
.verdict-signal{display:flex;flex-direction:column;gap:4px}
.verdict-action{font-family:var(--mono);font-size:14px;font-weight:700;letter-spacing:0.08em}
.verdict-action.sell{color:var(--husk)}
.verdict-action.hold{color:var(--sanjuan-l)}
.verdict-action.alert{color:var(--cherry-l)}
.verdict-reason{font-size:12px;color:var(--text2);max-width:280px;line-height:1.4}

/* MAIN CONTENT */
.main{max-width:900px;margin:0 auto;padding:2rem 1.5rem}

/* STEP SYSTEM */
.step{margin-bottom:2.5rem;opacity:0;transform:translateY(16px);transition:opacity .5s ease,transform .5s ease}
.step.visible{opacity:1;transform:translateY(0)}
.step-header{display:flex;align-items:center;gap:14px;margin-bottom:1.25rem}
.step-num{width:32px;height:32px;border-radius:50%;background:rgba(183,162,94,0.12);border:1px solid rgba(183,162,94,0.22);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:500;color:var(--husk);flex-shrink:0}
.step-title{font-family:var(--serif);font-size:20px;font-weight:600;color:var(--cream);letter-spacing:-0.01em}
.step-card{background:var(--tiber-mid);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.step-body{padding:1.5rem}

/* BENCHMARK VISUAL */
.benchmark-wrap{display:flex;flex-direction:column;gap:16px}
.bm-row{display:flex;align-items:center;gap:14px}
.bm-label{font-family:var(--mono);font-size:10px;color:var(--text3);width:160px;flex-shrink:0;line-height:1.4}
.bm-bar-wrap{flex:1}
.bm-track{height:10px;background:rgba(255,255,255,0.06);border-radius:5px;overflow:hidden;position:relative}
.bm-fill{height:100%;border-radius:5px;transition:width 1.2s cubic-bezier(0.34,1.56,0.64,1)}
.bm-val{font-family:var(--mono);font-size:13px;font-weight:500;white-space:nowrap;flex-shrink:0;min-width:70px;text-align:right}
.bm-gap{margin-top:14px;padding:12px 16px;border-radius:8px;font-family:var(--mono);font-size:12px;line-height:1.6}

/* WHY REASONS */
.reasons{display:flex;flex-direction:column;gap:10px}
.reason{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;background:var(--tiber);border-radius:8px;border-left:3px solid var(--border)}
.reason.positive{border-left-color:var(--husk)}
.reason.negative{border-left-color:var(--cherry-l)}
.reason.neutral{border-left-color:var(--sanjuan)}
.reason-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.reason-text{font-size:13px;color:var(--text2);line-height:1.65}
.reason-text strong{color:var(--cream);font-weight:500}

/* MARKET TABLE */
.mkt-table{width:100%;border-collapse:collapse}
.mkt-table th{font-family:var(--mono);font-size:9px;color:var(--text4);text-transform:uppercase;letter-spacing:.1em;padding:8px 14px;text-align:left;border-bottom:1px solid var(--border);font-weight:500}
.mkt-table td{font-family:var(--mono);font-size:12px;padding:11px 14px;border-bottom:1px solid rgba(183,162,94,.04);vertical-align:middle}
.mkt-table tr:last-child td{border-bottom:none}
.mkt-table tr.highlight td{background:rgba(183,162,94,.05)}
.mkt-table td:first-child{color:var(--cream);font-weight:500}
.best-badge{font-size:8px;font-weight:700;padding:2px 6px;border-radius:2px;background:rgba(183,162,94,.15);color:var(--husk);letter-spacing:.06em;margin-left:6px}

/* ACTION STEPS */
.action-steps{display:flex;flex-direction:column;gap:0}
.action-step{display:flex;align-items:flex-start;gap:14px;padding:14px 16px;border-bottom:1px solid var(--border)}
.action-step:last-child{border-bottom:none}
.action-num{width:26px;height:26px;border-radius:50%;background:var(--husk);color:var(--tiber);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px}
.action-content{}
.action-title{font-size:14px;font-weight:500;color:var(--cream);margin-bottom:4px}
.action-desc{font-size:12px;color:var(--text2);line-height:1.65}

/* RISK FACTORS */
.risks{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.risk-item{background:var(--tiber);border-radius:8px;padding:12px 14px;border:1px solid var(--border)}
.risk-title{font-size:13px;font-weight:500;color:var(--cream);margin-bottom:4px;display:flex;align-items:center;gap:7px}
.risk-desc{font-size:12px;color:var(--text2);line-height:1.6}

/* EXPLOITATION THRESHOLD */
.threshold-card{background:var(--tiber);border:1px solid rgba(116,7,14,.25);border-radius:10px;padding:1.25rem 1.5rem}
.threshold-title{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--cherry-l);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.threshold-row{display:flex;align-items:center;gap:16px;margin-bottom:10px;flex-wrap:wrap}
.threshold-val{font-family:var(--mono);font-size:28px;font-weight:500;line-height:1}
.threshold-desc{font-size:13px;color:var(--text2);line-height:1.6;flex:1;min-width:200px}
.threshold-action{background:rgba(116,7,14,.1);border:1px solid rgba(116,7,14,.2);border-radius:6px;padding:10px 14px;font-size:12px;color:rgba(192,16,27,.8);line-height:1.65;margin-top:8px}

/* VERDICT FINAL */
.final-verdict{background:var(--tiber-mid);border:1px solid var(--border2);border-radius:14px;padding:2rem;text-align:center;position:relative;overflow:hidden}
.final-verdict::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(183,162,94,0.08) 0%,transparent 70%);pointer-events:none}
.fv-inner{position:relative;z-index:1}
.fv-label{font-family:var(--mono);font-size:9px;font-weight:500;color:var(--text4);letter-spacing:.14em;text-transform:uppercase;margin-bottom:12px}
.fv-action{font-family:var(--serif);font-size:clamp(28px,5vw,48px);font-weight:700;letter-spacing:-0.02em;margin-bottom:.75rem}
.fv-action.sell{color:var(--husk)}
.fv-action.hold{color:var(--sanjuan-l)}
.fv-action.alert{color:var(--cherry-l)}
.fv-summary{font-size:15px;color:var(--text2);line-height:1.75;max-width:500px;margin:0 auto 1.5rem;font-weight:300}
.fv-btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px;font-weight:500;padding:12px 24px;background:var(--husk);color:var(--tiber);border:none;border-radius:6px;cursor:none;text-decoration:none;transition:all .2s;letter-spacing:.04em}
.fv-btn:hover{background:var(--husk-l)}
.fv-ghost{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px;font-weight:500;padding:12px 24px;background:transparent;color:var(--husk);border:1px solid rgba(183,162,94,.3);border-radius:6px;cursor:none;text-decoration:none;transition:all .2s;letter-spacing:.04em;margin-left:10px}
.fv-ghost:hover{border-color:var(--husk)}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:0 -1.5rem 1.5rem}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--tiber)}::-webkit-scrollbar-thumb{background:var(--tiber-border);border-radius:2px}

/* PROGRESS BAR */
.progress-bar{position:fixed;top:0;left:0;height:2px;background:var(--husk);z-index:200;transition:width .1s}

@media(max-width:600px){.risks{grid-template-columns:1fr}.bm-label{width:100px;font-size:9px}.verdict-card{flex-wrap:wrap;gap:10px}.fv-btn,.fv-ghost{width:100%;justify-content:center;margin:4px 0}}
</style>
</head>

;(function a(){rx+=(mx-rx)*.13;ry+=(my-ry)*.13;curR.style.left=rx+"px";curR.style.top=ry+"px";requestAnimationFrame(a)})()
document.querySelectorAll("a,button").forEach(el=>{
  el.addEventListener("mouseenter",()=>{cur.style.transform="translate(-50%,-50%) scale(2)";curR.style.transform="translate(-50%,-50%) scale(1.5)"})

// ── URL params ──────────────────────────────────────
const params = new URLSearchParams(window.location.search)
const commodityKey = params.get("c") || "maize-nairobi"
const data = COMMODITY_DATA[commodityKey]

if (!data) {
  document.getElementById("heroTitle").textContent = "Commodity not found"
  document.getElementById("mainContent").innerHTML = "<p style=\"padding:2rem;color:var(--text2)\">Return to dashboard and click a price card to see its detail.</p>"
} else {
  renderDetail(data)
}

function renderDetail(d) {
  // Hero
  document.getElementById("heroTag").textContent = d.tag
  document.getElementById("heroTitle").textContent = d.name
  document.getElementById("heroLocation").textContent = d.location
  document.getElementById("verdictPrice").textContent = "KES " + d.price
  document.getElementById("verdictAction").textContent = d.action.toUpperCase()
  document.getElementById("verdictAction").className = "verdict-action " + d.action
  document.getElementById("verdictReason").textContent = d.verdict.split(".")[0] + "."
  document.getElementById("heroUpdated").textContent = "Updated " + new Date().toLocaleDateString("en-KE", {day:"numeric",month:"long",year:"numeric"})
  document.getElementById("navBreadcrumb").textContent = "Dashboard → " + d.name

  const main = document.getElementById("mainContent")

  // STEP 1 — PRICE VS BENCHMARK
  const bmPct = Math.round((d.benchmark.local / d.benchmark.world_bank) * 100)
  const localPct = 100
  const wbPct = Math.round((d.benchmark.world_bank / d.benchmark.local) * 100)
  const step1 = `
  <div class="step" id="s1">
    <div class="step-header">
      <div class="step-num">01</div>
      <div class="step-title">Is the price fair? Benchmark comparison</div>
    </div>
    <div class="step-card">
      <div class="step-body">
        <div class="benchmark-wrap">
          <div class="bm-row">
            <div class="bm-label">${d.benchmark.world_bank_label}</div>
            <div class="bm-bar-wrap"><div class="bm-track"><div class="bm-fill" style="width:0%;background:var(--sanjuan)" data-target="${wbPct}"></div></div></div>
            <div class="bm-val" style="color:var(--sanjuan-l)">KES ${d.benchmark.world_bank}</div>
          </div>
          <div class="bm-row">
            <div class="bm-label">${d.benchmark.local_label}</div>
            <div class="bm-bar-wrap"><div class="bm-track"><div class="bm-fill" style="width:0%;background:var(--husk)" data-target="100"></div></div></div>
            <div class="bm-val" style="color:var(--husk)">KES ${d.benchmark.local}</div>
          </div>
          <div class="bm-row">
            <div class="bm-label">Exploitation threshold (80% of fair)</div>
            <div class="bm-bar-wrap"><div class="bm-track"><div class="bm-fill" style="width:0%;background:var(--cherry)" data-target="${Math.round((d.benchmark.exploit_thresh/d.benchmark.local)*100)}"></div></div></div>
            <div class="bm-val" style="color:var(--cherry-l)">KES ${d.benchmark.exploit_thresh}</div>
          </div>
        </div>
        <div class="bm-gap" style="background:rgba(183,162,94,0.08);border:1px solid rgba(183,162,94,0.15);color:var(--text2)">
          <strong style="color:var(--husk)">Verdict:</strong> ${d.benchmark.gap_text}
        </div>
      </div>
    </div>
  </div>`

  // STEP 2 — WHY THIS SIGNAL
  const step2 = `
  <div class="step" id="s2">
    <div class="step-header">
      <div class="step-num">02</div>
      <div class="step-title">Why this signal? The reasoning</div>
    </div>
    <div class="step-card">
      <div class="step-body">
        <div class="reasons">
          ${d.why.map(r=>`<div class="reason ${r.type}"><div class="reason-icon">${r.icon}</div><div class="reason-text">${r.text}</div></div>`).join("")}
        </div>
      </div>
    </div>
  </div>`

  // STEP 3 — MARKET COMPARISON
  const step3 = `
  <div class="step" id="s3">
    <div class="step-header">
      <div class="step-num">03</div>
      <div class="step-title">Where else is this selling? Market comparison</div>
    </div>
    <div class="step-card">
      <div class="tbl-wrap"><table class="mkt-table">
        <thead><tr><th>Location</th><th>Price</th><th>Signal</th><th>Note</th></tr></thead>
        <tbody>
          ${d.markets.map(m=>`<tr ${m.highlight?"class=\"highlight\"":""}>
            <td>${m.location}${m.highlight?"<span class=\"best-badge\">YOU ARE HERE</span>":""}</td>
            <td style="font-family:var(--mono);color:var(--cream);font-weight:500">KES ${m.price}</td>
            <td><span style="font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 7px;border-radius:2px;letter-spacing:.06em;${m.action==="sell"?"background:rgba(183,162,94,.14);color:var(--husk)":m.action==="hold"?"background:rgba(53,85,110,.2);color:var(--sanjuan-l)":"background:rgba(192,16,27,.14);color:var(--cherry-l)"}">${m.action.toUpperCase()}</span></td>
            <td style="font-size:11px;color:var(--text3)">${m.note}</td>
          </tr>`).join("")}
        </tbody>
      </table></div>
    </div>
  </div>`

  // STEP 4 — WHAT TO DO
  const step4 = `
  <div class="step" id="s4">
    <div class="step-header">
      <div class="step-num">04</div>
      <div class="step-title">What should you do? Step by step</div>
    </div>
    <div class="step-card">
      <div class="action-steps">
        ${d.actions.map((a,i)=>`<div class="action-step">
          <div class="action-num">${i+1}</div>
          <div class="action-content">
            <div class="action-title">${a.title}</div>
            <div class="action-desc">${a.desc}</div>
          </div>
        </div>`).join("")}
      </div>
    </div>
  </div>`

  // STEP 5 — RISK FACTORS
  const step5 = `
  <div class="step" id="s5">
    <div class="step-header">
      <div class="step-num">05</div>
      <div class="step-title">What could change this? Risk factors</div>
    </div>
    <div class="step-card">
      <div class="step-body">
        <div class="risks">
          ${d.risks.map(r=>`<div class="risk-item">
            <div class="risk-title">${r.title}</div>
            <div class="risk-desc">${r.desc}</div>
          </div>`).join("")}
        </div>
      </div>
    </div>
  </div>`

  // STEP 6 — EXPLOITATION THRESHOLD
  const step6 = `
  <div class="step" id="s6">
    <div class="step-header">
      <div class="step-num">06</div>
      <div class="step-title">Know your rights — exploitation threshold</div>
    </div>
    <div class="threshold-card">
      <div class="threshold-title">&#9888; MINIMUM ACCEPTABLE PRICE</div>
      <div class="threshold-row">
        <div class="threshold-val" style="color:var(--cherry-l)">KES ${d.exploit_thresh}/${d.exploit_currency==="KES"?"kg":"head"}</div>
        <div class="threshold-desc">This is the 80% exploitation threshold for ${d.name}. Any offer below this price is exploitation.</div>
      </div>
      <div class="threshold-action">${d.exploit_text}</div>
    </div>
  </div>`

  // FINAL VERDICT
  const finalVerdict = `
  <div class="step" id="s7">
    <div class="final-verdict">
      <div class="fv-inner">
        <div class="fv-label">SOKODATA FINAL VERDICT</div>
        <div class="fv-action ${d.final_action}">${d.final_verdict.split(".")[0]}</div>
        <p class="fv-summary">${d.final_detail}</p>
        <div>
          <a href="dashboard.html" class="fv-btn">&#8592; Back to Dashboard</a>
          <a href="dashboard.html#arbitrage" class="fv-ghost">View Arbitrage &#8594;</a>
        </div>
      </div>
    </div>
  </div>`

  main.innerHTML = step1 + step2 + step3 + step4 + step5 + step6 + finalVerdict

  // Scroll reveal
  document.querySelectorAll(".step").forEach(el=>obs.observe(el))

  // Animate bars after a delay
  setTimeout(()=>{
    document.querySelectorAll(".bm-fill[data-target]").forEach(bar=>{
      bar.style.width = bar.dataset.target + "%"
    })
  }, 400)
}
</script>
