<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SokoData — Live Market Dashboard</title>
<link rel="icon" type="image/x-icon" href="favicon.ico"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --tiber:#042820;--tiber-mid:#0a3d30;--tiber-light:#0d4d3c;--tiber-border:#0f5a46;
  --husk:#b7a25e;--husk-l:#cdbf85;--husk-d:#9a8445;
  --sanjuan:#35556e;--sanjuan-l:#4a6d8a;
  --cherry:#74070e;--cherry-l:#c0101b;
  --curious:#2092e9;
  --mulled:#614d70;
  --cream:#f5f0e8;--text2:#a8c4b8;--text3:#5a8070;--text4:#3d5e58;
  --border:rgba(183,162,94,0.1);--border2:rgba(183,162,94,0.18);
  --sans:"Plus Jakarta Sans",sans-serif;
  --serif:"Fraunces",serif;
  --mono:"DM Mono",monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--tiber);color:var(--cream);min-height:100vh;overflow-x:hidden;cursor:none}

/* CURSOR */
.cursor{position:fixed;width:7px;height:7px;background:var(--husk);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .1s}
.cursor-ring{position:fixed;width:26px;height:26px;border:1px solid rgba(183,162,94,0.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .15s ease}

/* NAV */
.nav{position:sticky;top:0;z-index:100;height:56px;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;background:rgba(4,40,32,0.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);gap:12px}
.nav-logo{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:14px;font-weight:500;color:var(--husk);letter-spacing:0.08em;text-decoration:none;flex-shrink:0}
.nav-tabs{display:flex;gap:0;flex:1;overflow-x:auto}
.nav-tab{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--text3);padding:0 14px;height:56px;display:flex;align-items:center;cursor:none;border:none;background:none;border-bottom:2px solid transparent;transition:all .15s;letter-spacing:0.06em;text-transform:uppercase;white-space:nowrap}
.nav-tab:hover{color:var(--text2)}
.nav-tab.active{color:var(--husk);border-bottom-color:var(--husk)}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.nav-time{font-family:var(--mono);font-size:11px;color:var(--text4)}
.nav-plan{font-family:var(--mono);font-size:9px;font-weight:500;padding:3px 8px;border-radius:3px;letter-spacing:0.08em}
.plan-free{background:rgba(255,255,255,.06);color:var(--text3)}
.plan-pro{background:rgba(183,162,94,.15);color:var(--husk);border:1px solid rgba(183,162,94,.25)}
.btn{font-family:var(--mono);font-size:10px;font-weight:600;padding:6px 14px;border-radius:4px;cursor:none;border:none;transition:all .15s;letter-spacing:0.05em}
.btn-primary{background:var(--husk);color:var(--tiber)}
.btn-primary:hover{background:var(--husk-l)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{border-color:var(--husk);color:var(--husk)}

/* TICKER */
.ticker-wrap{height:34px;overflow:hidden;background:var(--tiber-mid);border-bottom:1px solid var(--border);display:flex;align-items:center}
.ticker-badge{font-family:var(--mono);font-size:9px;font-weight:500;color:var(--tiber);background:var(--husk);padding:0 14px;height:100%;display:flex;align-items:center;letter-spacing:0.12em;flex-shrink:0;border-right:1px solid var(--border)}
.ticker-scroll{overflow:hidden;flex:1}
.ticker-track{display:flex;white-space:nowrap;animation:ticker 50s linear infinite}
.ticker-track:hover{animation-play-state:paused}
.t-item{font-family:var(--mono);font-size:11px;color:var(--text3);padding:0 20px;display:flex;align-items:center;gap:7px}
.t-sym{color:var(--text4);font-size:10px}
.t-val{color:var(--cream);font-weight:500}
.t-up{color:var(--husk);font-size:10px}
.t-dn{color:var(--cherry-l);font-size:10px}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* MAIN LAYOUT */
#appMain{padding:0}
.page{display:none}.page.active{display:block}

/* ZONE 1 — THE ANSWER */
.zone1{background:var(--tiber-mid);border-bottom:1px solid var(--border);padding:1.25rem 1.5rem}
.zone1-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.zone1-title{font-family:var(--mono);font-size:9px;font-weight:500;color:var(--text4);letter-spacing:0.14em;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.zone1-title::before{content:"";width:16px;height:1px;background:var(--husk)}
.zone1-sub{font-family:var(--mono);font-size:10px;color:var(--text4)}
.answer-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.answer-card{background:var(--tiber);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;transition:border-color .2s,transform .2s;cursor:none}
.answer-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.answer-card.sell{border-left:3px solid var(--husk)}
.answer-card.hold{border-left:3px solid var(--sanjuan)}
.answer-card.alert{border-left:3px solid var(--cherry-l)}
.ac-commodity{font-family:var(--mono);font-size:9px;font-weight:500;color:var(--text3);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:6px}
.ac-location{font-size:11px;color:var(--text4);margin-bottom:8px}
.ac-price{font-family:var(--mono);font-size:22px;font-weight:500;color:var(--cream);line-height:1;margin-bottom:6px}
.ac-signal{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;font-weight:600;padding:4px 10px;border-radius:3px;letter-spacing:0.08em}
.sig-sell{background:rgba(183,162,94,.15);color:var(--husk)}
.sig-hold{background:rgba(53,85,110,.2);color:var(--sanjuan-l)}
.sig-alert{background:rgba(192,16,27,.15);color:var(--cherry-l)}
.ac-trend{font-family:var(--mono);font-size:10px;margin-top:6px}
.trend-up{color:var(--husk)}.trend-dn{color:var(--cherry-l)}.trend-flat{color:var(--text4)}

/* ZONE 2 — LIVE DATA */
.zone2{padding:1.25rem 1.5rem}
.zone2-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.25rem}
.z2-tab{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--text4);padding:8px 16px;background:none;border:none;cursor:none;border-bottom:2px solid transparent;letter-spacing:0.06em;text-transform:uppercase;transition:all .15s}
.z2-tab:hover{color:var(--text2)}
.z2-tab.active{color:var(--husk);border-bottom-color:var(--husk)}
.z2-panel{display:none}.z2-panel.active{display:block}

/* GRID */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.25rem}

/* PANEL */
.panel{background:var(--tiber-mid);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--tiber-light)}
.panel-title{font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:0.12em;color:var(--text3);text-transform:uppercase}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-family:var(--mono);font-size:8px;font-weight:500;color:var(--text4);text-transform:uppercase;letter-spacing:0.1em;padding:7px 12px;text-align:left;border-bottom:1px solid var(--border)}
td{font-family:var(--mono);font-size:11px;padding:9px 12px;border-bottom:1px solid rgba(183,162,94,.04);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(183,162,94,.03)}
td:first-child{color:var(--cream);font-weight:500}
.pill{font-size:8px;font-weight:600;padding:2px 7px;border-radius:2px;letter-spacing:0.06em;display:inline-block}
.p-sell{background:rgba(183,162,94,.14);color:var(--husk)}
.p-hold{background:rgba(53,85,110,.2);color:var(--sanjuan-l)}
.p-alert{background:rgba(192,16,27,.15);color:var(--cherry-l)}
.p-live{background:rgba(32,146,233,.15);color:var(--curious)}

/* FOREX */
.fx-row{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid rgba(183,162,94,.04)}
.fx-row:last-child{border-bottom:none}
.fx-row:hover{background:rgba(183,162,94,.03)}
.fx-sym{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--cream)}
.fx-rate{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--cream)}
.fx-chg{font-family:var(--mono);font-size:10px}

/* ARB */
.arb-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid rgba(183,162,94,.04)}
.arb-row:last-child{border-bottom:none}
.arb-row:hover{background:rgba(183,162,94,.03)}
.arb-name{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--cream);flex:1}
.arb-route{font-family:var(--mono);font-size:10px;color:var(--text4);margin-top:2px}
.arb-spread{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--husk)}
.arb-hot{font-size:8px;font-weight:700;padding:2px 7px;border-radius:2px;background:rgba(183,162,94,.14);color:var(--husk);letter-spacing:.06em}
.arb-warm{font-size:8px;font-weight:700;padding:2px 7px;border-radius:2px;background:rgba(53,85,110,.2);color:var(--sanjuan-l);letter-spacing:.06em}

/* ZONE 3 — ALERTS */
.zone3{padding:0 1.5rem 1.5rem}
.alert-item{padding:11px 14px;border-bottom:1px solid rgba(183,162,94,.04);border-left:3px solid transparent}
.alert-item.crit{border-left-color:var(--cherry-l)}
.alert-item.warn{border-left-color:var(--husk-d)}
.alert-item:last-child{border-bottom:none}
.alert-name{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--cream);margin-bottom:3px}
.alert-desc{font-size:11px;color:var(--text2);line-height:1.5}
.alert-tag{font-family:var(--mono);font-size:8px;font-weight:600;padding:2px 6px;border-radius:2px;margin-right:6px;letter-spacing:.06em}
.tag-crit{background:rgba(192,16,27,.15);color:var(--cherry-l)}
.tag-warn{background:rgba(183,162,94,.14);color:var(--husk-d)}

/* HEATMAP */
.heatmap{display:grid;grid-template-columns:repeat(6,1fr);gap:3px;padding:12px}
.hm-cell{aspect-ratio:1;border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:8px;font-weight:500;cursor:none;transition:transform .1s}
.hm-cell:hover{transform:scale(1.12)}

/* FX CALC */
.fx-calc{padding:16px;display:flex;flex-direction:column;gap:12px}
.fc-label{font-family:var(--mono);font-size:9px;font-weight:500;color:var(--text4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;display:block}
.fc-input{width:100%;background:var(--tiber);border:1px solid var(--border2);color:var(--cream);font-family:var(--mono);font-size:13px;padding:9px 11px;border-radius:4px;outline:none;transition:border-color .2s;cursor:auto}
.fc-input:focus{border-color:var(--husk)}
.fc-result{background:var(--tiber);border:1px solid var(--border);border-radius:7px;padding:18px;text-align:center}
.fc-res-lbl{font-family:var(--mono);font-size:9px;color:var(--text4);letter-spacing:.1em;margin-bottom:7px}
.fc-res-val{font-family:var(--mono);font-size:26px;font-weight:500;color:var(--husk)}
.fc-res-rate{font-family:var(--mono);font-size:10px;color:var(--text4);margin-top:5px}

/* LOCK */
.lock-wrap{padding:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center}
.lock-icon{font-size:20px;color:var(--text4)}
.lock-text{font-family:var(--mono);font-size:10px;color:var(--text4);letter-spacing:.08em}
.lock-btn{font-family:var(--mono);font-size:10px;font-weight:600;padding:7px 16px;background:var(--husk);color:var(--tiber);border:none;border-radius:4px;cursor:none}

/* BADGE */
.badge{font-family:var(--mono);font-size:8px;font-weight:600;padding:2px 7px;border-radius:2px;letter-spacing:.06em}
.b-live{background:rgba(183,162,94,.14);color:var(--husk);border:1px solid rgba(183,162,94,.2)}
.b-alert{background:rgba(192,16,27,.14);color:var(--cherry-l);border:1px solid rgba(192,16,27,.2)}
.b-pro{background:rgba(97,77,112,.2);color:#9b7db8;border:1px solid rgba(97,77,112,.3)}
.b-info{background:rgba(32,146,233,.14);color:var(--curious);border:1px solid rgba(32,146,233,.2)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(4,40,32,.88);backdrop-filter:blur(10px);z-index:200;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--tiber-mid);border:1px solid var(--border2);border-radius:12px;padding:2.5rem;width:400px;max-width:95vw;position:relative}
.modal-close{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--text4);font-size:18px;cursor:none;line-height:1}
.modal-title{font-family:var(--serif);font-size:20px;font-weight:600;color:var(--cream);margin-bottom:5px}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:22px;line-height:1.6}
.modal-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:18px}
.modal-tab{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text4);padding:7px 18px;background:none;border:none;border-bottom:2px solid transparent;cursor:none;transition:all .15s}
.modal-tab.active{color:var(--husk);border-bottom-color:var(--husk)}
.field{margin-bottom:13px}
.field label{display:block;font-family:var(--mono);font-size:9px;font-weight:500;color:var(--text4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.field input{width:100%;background:var(--tiber);border:1px solid var(--border2);color:var(--cream);font-family:var(--mono);font-size:12px;padding:9px 11px;border-radius:4px;outline:none;transition:border-color .2s;cursor:auto}
.field input:focus{border-color:var(--husk)}
.auth-err{font-family:var(--mono);font-size:10px;color:var(--cherry-l);min-height:14px;margin-bottom:8px}
.auth-btn{width:100%;padding:11px;background:var(--husk);color:var(--tiber);font-family:var(--mono);font-size:11px;font-weight:600;border:none;border-radius:4px;cursor:none;transition:all .15s}
.auth-btn:hover{background:var(--husk-l)}
.auth-btn:disabled{opacity:.5}

/* PLANS PAGE */
.plans-wrap{max-width:960px;margin:0 auto;padding:2rem 1.5rem}
.plans-hero{text-align:center;padding:2rem 0 1.5rem}
.plans-hero h1{font-family:var(--serif);font-size:clamp(24px,4vw,42px);font-weight:600;color:var(--cream);margin-bottom:10px;letter-spacing:-0.02em}
.plans-hero p{font-size:14px;color:var(--text2);font-weight:300;line-height:1.7}
.plans-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin:1.5rem 0}
.plan-card{background:var(--tiber-mid);padding:1.75rem 1.5rem;position:relative}
.plan-card.featured{background:var(--tiber-light)}
.plan-badge{position:absolute;top:0;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:8px;font-weight:600;color:var(--tiber);background:var(--husk);padding:2px 12px;border-radius:0 0 5px 5px;letter-spacing:.1em}
.plan-name{font-family:var(--mono);font-size:9px;font-weight:500;color:var(--text4);letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px}
.plan-price{font-family:var(--mono);font-size:30px;font-weight:500;color:var(--cream);margin-bottom:3px;line-height:1}
.plan-price span{font-size:13px;color:var(--text4);font-weight:400}
.plan-period{font-size:11px;color:var(--text4);margin-bottom:1.25rem}
.plan-features{list-style:none;margin-bottom:1.25rem;display:flex;flex-direction:column;gap:8px}
.plan-features li{font-size:11px;color:var(--text2);display:flex;align-items:flex-start;gap:7px;line-height:1.5}
.plan-features li::before{content:"";width:4px;height:4px;border-radius:50%;background:var(--husk);flex-shrink:0;margin-top:5px}
.plan-features li.locked{color:var(--text4)}.plan-features li.locked::before{background:var(--text4)}
.plan-btn{width:100%;padding:10px;font-family:var(--mono);font-size:11px;font-weight:600;border-radius:4px;cursor:none;border:none;transition:all .15s;letter-spacing:.04em}
.plan-btn-outline{background:transparent;color:var(--text3);border:1px solid var(--border2)}.plan-btn-outline:hover{border-color:var(--husk);color:var(--husk)}
.plan-btn-primary{background:var(--husk);color:var(--tiber)}.plan-btn-primary:hover{background:var(--husk-l)}
.plan-btn-ent{background:transparent;color:var(--sanjuan-l);border:1px solid rgba(53,85,110,.3)}
.plans-footer{text-align:center;font-family:var(--mono);font-size:10px;color:var(--text4);padding-bottom:1.5rem}

/* EMPTY */
.empty{padding:24px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--text4)}
.loading{padding:40px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--text4)}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--tiber)}
::-webkit-scrollbar-thumb{background:var(--tiber-border);border-radius:2px}

/* RESPONSIVE */
@media(max-width:1000px){.answer-grid{grid-template-columns:repeat(2,1fr)}.grid2,.grid3{grid-template-columns:1fr}}
@media(max-width:600px){.nav-tabs{display:none}.answer-grid{grid-template-columns:1fr}}
</style>
</head>

// FETCH PRICES
async function fetchAll(){
  try{
    const fx=await fetch(CONFIG.FX_URL).then(r=>r.json())
    if(fx.result==="success"){
      _cache.forex={USD_KES:fx.rates.KES,EUR_KES:fx.rates.KES/fx.rates.EUR,GBP_KES:fx.rates.KES/fx.rates.GBP,USD_UGX:fx.rates.UGX,USD_TZS:fx.rates.TZS,USD_ETB:fx.rates.ETB,USD_SOS:fx.rates.SOS,KES_SOS:fx.rates.SOS/fx.rates.KES,source:"ExchangeRate-API (live)"}
    }
  }catch(e){_cache.forex=STATIC_FOREX}
  if(!_cache.forex)_cache.forex=STATIC_FOREX

  const sb=getSB()
  if(sb){
    const{data}=await sb.from("prices").select("*").order("fetched_at",{ascending:false}).limit(40)
    if(data&&data.length){
      const seen=new Set()
      _cache.commodities=data.filter(r=>{const k=r.commodity+":"+r.location;if(seen.has(k))return false;seen.add(k);return true})
    }
    const{data:ls}=await sb.from("livestock_prices").select("*").order("fetched_at",{ascending:false}).limit(20)
    if(ls&&ls.length)_cache.livestock=ls
  }
  if(!_cache.commodities)_cache.commodities=STATIC_COMMODITIES
  if(!_cache.livestock)_cache.livestock=STATIC_LIVESTOCK
}

// ARBITRAGE
function calcArb(comms){
  const byName={}
  comms.forEach(c=>{if(!byName[c.commodity])byName[c.commodity]=[];byName[c.commodity].push(c)})
  const arb=[]
  Object.entries(byName).forEach(([name,markets])=>{
    if(markets.length<2)return
    markets.sort((a,b)=>a.price_kes-b.price_kes)
    const lo=markets[0],hi=markets[markets.length-1]
    const spread=hi.price_kes-lo.price_kes
    if(spread>5)arb.push({commodity:name,buy_loc:lo.location,sell_loc:hi.location,buy_price:lo.price_kes,sell_price:hi.price_kes,gross:spread,net:(spread*.65).toFixed(0),rating:spread>40?"hot":"warm"})
  })
  return arb.sort((a,b)=>b.gross-a.gross)
}

function showPage(id,tabEl){
  _currentPage=id

  else document.querySelector(`.nav-tab[data-page="${id}"]`)?.classList.add("active")

// HEATMAP
function buildHeatmap(){
  const el=document.getElementById("heatmap");if(!el)return
  const regions=[{n:"Nairobi",v:2},{n:"Mombasa",v:1},{n:"Kisumu",v:1},{n:"Nakuru",v:1},{n:"Eldoret",v:0},{n:"Garissa",v:4},{n:"Wajir",v:5},{n:"Mandera",v:5},{n:"Isiolo",v:3},{n:"Marsabit",v:4},{n:"Malindi",v:2},{n:"Machakos",v:2},{n:"Thika",v:1},{n:"Nyeri",v:1},{n:"Meru",v:2},{n:"Kericho",v:0},{n:"Bomet",v:0},{n:"Busia",v:0}]
  const colors=["#1a4d1a","#2d7a2d","#8b7300","#ba7517","#d85a30","#c23030"]
  el.innerHTML=regions.map(r=>`<div class="hm-cell" title="${r.n}: ${["Low","Below avg","Average","Above avg","High","Critical"][r.v]}" style="background:${colors[Math.min(r.v,5)]};color:${r.v>=3?"#fff":"#ccc"};font-size:7px">${r.n.slice(0,3).toUpperCase()}</div>`).join("")
}

// FX CALC
const FX_RATES=()=>{
  const fx=_cache.forex||STATIC_FOREX
  return{USD:1,KES:fx.USD_KES||129.4,SOS:fx.USD_SOS||571,UGX:fx.USD_UGX||3710,TZS:fx.USD_TZS||2615,ETB:fx.USD_ETB||57.85,EUR:fx.USD_KES?(fx.USD_KES/fx.EUR_KES||0.921):0.921,GBP:fx.USD_KES?(fx.USD_KES/fx.GBP_KES||0.779):0.779}
}
function calcFX(){
  const amt=parseFloat(document.getElementById("fcAmt")?.value)||0
  const from=document.getElementById("fcFrom")?.value
  const to=document.getElementById("fcTo")?.value
  if(!from||!to)return
  const rates=FX_RATES()
  const inUSD=amt/rates[from],result=inUSD*rates[to],rate=rates[to]/rates[from]
  const res=document.getElementById("fcResult"),rat=document.getElementById("fcRate")
  if(res)res.textContent=result.toLocaleString(undefined,{maximumFractionDigits:2})+" "+to
  if(rat)rat.textContent=`1 ${from} = ${rate.toFixed(4)} ${to}`
}

  _smsKey=key
  document.querySelectorAll("#smsToggles button").forEach(b=>{b.className="btn btn-ghost";b.removeAttribute("data-active")})
  btn.className="btn btn-primary"

function setSmsLang(lang){
  _smsLang=lang
  document.getElementById("langEn").className=lang==="en"?"btn btn-primary":"btn btn-ghost"

function genSMS(){
  const tpl=SMS_TEMPLATES[_smsKey]?.[_smsLang]
  if(!tpl)return
  const txt=tpl()
  const out=document.getElementById("smsOut"),cnt=document.getElementById("smsCnt")
  if(out)out.textContent=txt
  if(cnt)cnt.textContent=`${txt.length} chars · ${Math.ceil(txt.length/160)} unit${txt.length>160?"s":""}`
}
function copySMS(){
  const txt=document.getElementById("smsOut")?.textContent||""
  navigator.clipboard.writeText(txt).then(()=>{
    const btn=event.target;btn.textContent="Copied!";setTimeout(()=>btn.textContent="Copy",1500)
  })
}

let _sb2=null
function getSB2(){if(!_sb2&&CONFIG.SUPABASE_URL)_sb2=supabase.createClient(CONFIG.SUPABASE_URL,CONFIG.SUPABASE_ANON);return _sb2}
function openModal(tab){document.getElementById("authModal").classList.add("open");switchAuthTab(tab||"signup")}

function switchAuthTab(tab){
  document.getElementById("tabLogin").classList.toggle("active",tab==="login")
  document.getElementById("tabSignup").classList.toggle("active",tab==="signup")
  const f=document.getElementById("authForm")
  if(tab==="login"){
    f.innerHTML=`<div class="field"><label>Email</label><input type="email" id="aEmail" placeholder="you@example.com"/></div><div class="field"><label>Password</label><input type="password" id="aPass" placeholder="&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;"/></div><div class="auth-err" id="aErr"></div><button class="auth-btn" onclick="doAuth('login')">Login &rarr;</button><div style="text-align:center;margin-top:12px;font-size:11px;color:var(--text4)">No account? <span style="color:var(--husk);cursor:pointer" onclick="switchAuthTab('signup')">Sign up free</span></div>`
  }else{
    f.innerHTML=`<div class="field"><label>Full Name</label><input type="text" id="aName" placeholder="Jane Wanjiru"/></div><div class="field"><label>Email</label><input type="email" id="aEmail" placeholder="you@example.com"/></div><div class="field"><label>Phone (M-Pesa)</label><input type="tel" id="aPhone" placeholder="+254700000000"/></div><div class="field"><label>Password</label><input type="password" id="aPass" placeholder="Min 8 characters"/></div><div class="auth-err" id="aErr"></div><button class="auth-btn" onclick="doAuth('signup')">Create Free Account &rarr;</button><div style="text-align:center;margin-top:12px;font-size:11px;color:var(--text4)">Already have an account? <span style="color:var(--husk);cursor:pointer" onclick="switchAuthTab('login')">Login</span></div>`
  }
}

async function doAuth(type){
  const sb=getSB2();if(!sb){alert("Connecting...");return}
  const btn=document.querySelector(".auth-btn"),err=document.getElementById("aErr")
  const email=document.getElementById("aEmail").value.trim(),pass=document.getElementById("aPass").value
  btn.disabled=true;btn.textContent="Please wait..."
  err.textContent=""
  let result
  if(type==="login"){result=await sb.auth.signInWithPassword({email,password:pass})}
  else{
    const name=document.getElementById("aName")?.value.trim()||"",phone=document.getElementById("aPhone")?.value.trim()||""
    result=await sb.auth.signUp({email,password:pass,options:{data:{full_name:name,phone}}})
    if(!result.error&&result.data.user)await sb.from("users").upsert({id:result.data.user.id,email,full_name:name,phone,plan:"free"})
  }
  if(result.error){err.textContent=result.error.message;btn.disabled=false;btn.textContent=type==="login"?"Login →":"Create Free Account →"}
  else{closeModal();document.getElementById("navPlan").textContent="PRO";document.getElementById("navPlan").className="nav-plan plan-pro"}
}
